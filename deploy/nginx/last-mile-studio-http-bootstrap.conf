location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type text/plain;
    try_files $uri =404;
}

location = /last-mile-studio {
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
    return 308 /last-mile-studio/;
}

location ^~ /last-mile-studio/assets/ {
    root /var/www/last-mile-studio/current;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}

location = /last-mile-studio/index.html {
    root /var/www/last-mile-studio/current;
    try_files $uri =404;
    expires -1;
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}

location /last-mile-studio/ {
    root /var/www/last-mile-studio/current;
    try_files $uri $uri/ /last-mile-studio/index.html;
    expires -1;
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}
