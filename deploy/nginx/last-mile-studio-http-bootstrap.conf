location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type text/plain;
    try_files $uri =404;
}

location = /AfterPrompt {
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
    return 308 /AfterPrompt/;
}

location ^~ /AfterPrompt/assets/ {
    root /var/www/last-mile-studio/current;
    rewrite ^/AfterPrompt/(.*)$ /last-mile-studio/$1 break;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}

location = /AfterPrompt/index.html {
    root /var/www/last-mile-studio/current;
    rewrite ^ /last-mile-studio/index.html break;
    try_files $uri =404;
    expires -1;
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}

location = /AfterPrompt/ {
    root /var/www/last-mile-studio/current;
    rewrite ^ /last-mile-studio/index.html break;
    try_files $uri =404;
    expires -1;
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}

location /AfterPrompt/ {
    root /var/www/last-mile-studio/current;
    rewrite ^/AfterPrompt/(.*)$ /last-mile-studio/$1 break;
    try_files $uri $uri/ /AfterPrompt/index.html;
    expires -1;
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}

location ^~ /last-mile-studio/assets/ {
    root /var/www/last-mile-studio/current;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
}

location = /last-mile-studio {
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
    return 308 /AfterPrompt/;
}

location /last-mile-studio/ {
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
    return 308 /AfterPrompt/;
}
