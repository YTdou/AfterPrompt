server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 47.237.77.35;

    root /var/www/last-mile-studio/current;

    ssl_certificate /etc/letsencrypt/live/47.237.77.35/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/47.237.77.35/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:LastMileStudioTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;

    location = /last-mile-studio {
        return 308 /last-mile-studio/;
    }

    location = /last-mile-studio/healthz {
        default_type text/plain;
        return 200 'ok';
    }

    location ^~ /last-mile-studio/assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
    }

    location = /last-mile-studio/index.html {
        try_files $uri =404;
        expires -1;
    }

    location /last-mile-studio/ {
        try_files $uri $uri/ /last-mile-studio/index.html;
        expires -1;
    }

    location / {
        return 404;
    }

    access_log /var/log/nginx/last-mile-studio-access.log;
    error_log /var/log/nginx/last-mile-studio-error.log;
}
