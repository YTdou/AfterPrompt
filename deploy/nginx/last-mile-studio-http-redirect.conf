location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type text/plain;
    try_files $uri =404;
}

location = /last-mile-studio {
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
    return 308 https://47.237.77.35/last-mile-studio/;
}

location ^~ /last-mile-studio/ {
    include /etc/nginx/snippets/last-mile-studio-security-headers.conf;
    return 308 https://47.237.77.35$request_uri;
}
