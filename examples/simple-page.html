<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple editable page</title>
    <link rel="stylesheet" href="simple-page.css" />
  </head>
  <body data-editor-id="page-root" data-editor-canvas-width="960" data-editor-canvas-height="640">
    <main data-editor-id="content-card" class="card">
      <h1 data-editor-id="page-title">A small AI-generated page</h1>
      <p data-editor-id="page-copy">Import this whole directory to verify local CSS and image resolution.</p>
      <img data-editor-id="page-image" src="assets/energy-illustration.svg" alt="GPU illustration" />
    </main>
  </body>
</html>
