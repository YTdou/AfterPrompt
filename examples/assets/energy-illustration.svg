<svg xmlns="http://www.w3.org/2000/svg" width="520" height="360" viewBox="0 0 520 360" role="img" aria-labelledby="title desc">
  <title id="title">Energy-aware inference illustration</title>
  <desc id="desc">A stylized GPU chip with energy waves and performance bars.</desc>
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#77a3ff"/>
      <stop offset="1" stop-color="#7e5ce8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="520" height="360" rx="30" fill="#101938"/>
  <g opacity=".26" stroke="#8cb0ff">
    <path d="M0 70H520M0 140H520M0 210H520M0 280H520"/>
    <path d="M70 0V360M140 0V360M210 0V360M280 0V360M350 0V360M420 0V360"/>
  </g>
  <g transform="translate(76 58)">
    <rect x="64" y="28" width="210" height="210" rx="28" fill="url(#chip)" filter="url(#glow)" opacity=".35"/>
    <rect x="82" y="46" width="174" height="174" rx="20" fill="#182650" stroke="#9db9ff" stroke-width="3"/>
    <path d="M114 118h44l22-32 28 84 22-52h36" fill="none" stroke="#78f0c5" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="169" y="200" text-anchor="middle" fill="#e9efff" font-family="system-ui,sans-serif" font-size="24" font-weight="700">GPU</text>
    <g fill="#94adf5">
      <rect x="42" y="72" width="24" height="14" rx="4"/><rect x="42" y="106" width="24" height="14" rx="4"/><rect x="42" y="140" width="24" height="14" rx="4"/><rect x="42" y="174" width="24" height="14" rx="4"/>
      <rect x="274" y="72" width="24" height="14" rx="4"/><rect x="274" y="106" width="24" height="14" rx="4"/><rect x="274" y="140" width="24" height="14" rx="4"/><rect x="274" y="174" width="24" height="14" rx="4"/>
    </g>
  </g>
  <g transform="translate(364 78)" fill="#6f91e8">
    <rect x="0" y="126" width="26" height="92" rx="8"/>
    <rect x="42" y="78" width="26" height="140" rx="8" fill="#78dcb8"/>
    <rect x="84" y="24" width="26" height="194" rx="8" fill="#8d75ed"/>
  </g>
</svg>
